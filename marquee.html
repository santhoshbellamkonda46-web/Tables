<!DOCTYPE html>
<html>
    <head>
        <title>marquee - example</title>
    </head>
    <body>
        <marquee direction="right">
            <h1>CSS</h1>
        </marquee>

        <marquee direction="up">
            <h1>CSS</h1>
        </marquee>

        <marquee direction="down">
            <h1>CSS</h1>
        </marquee>

        <marquee width="30%">
            <h1>CSS</h1>
        </marquee>

        <marquee scrollamount="4">
            <h1>CSS</h1>
        </marquee>
        
        
        
        
    </body>
</html>
