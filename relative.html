<!DOCTYPE html>
<html>
    <head>
        <title>relative-position</title>
        <style>
            .common{
                width: 75px;
                height: 75px;
                border: 2px gray;
                color: white;

            }
            .c1{
                background-color: cyan;

            }
            .c2{
                background-color: pink;
                position: relative;
                left: 20px;
                bottom: 60px;

            }
            .c3{
                background-color: brown;
                position: relative;
                left: 40px;
                bottom: 120px;
                z-index: 10;

            }
            .c4{
                background-color: orange;
                position: relative;
                left: 60px;
                bottom: 180px;
                z-index: 9;

            }
            .c5{
                background-color: blue;
                position: relative;
                left: 80px;
                bottom: 240px;

            }
        </style>
    </head>
    <body>
        <div class="common c1">1</div>
        <div class="common c2">2</div>
        <div class="common c3">3</div>
        <div class="common c4">4</div>
        <div class="common c5">5</div>
    </body>

</html>
