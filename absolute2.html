<!DOCTYPE html>
<html>
    <head>
        <title>absolute-position</title>
        <style>
            img{
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%,-50%);
            }
            button{
                position: absolute;
                left: 50%;
                top: 70%;
                transform: translate(-50%,-70%);

            }
        </style>
    </head>
    <body>
        <img src="hotstar.png" alt="hotstar">
        <button>LOGIN</button>
    </body>
</html>
