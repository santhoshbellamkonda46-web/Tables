<!DOCTYPE html>
<html>
    <head>
        <title>Table5</title>
        <title>Tables with css</title>
        <style>
            table{
                 width: 30%;
                margin: 100px auto;
                border: 2px solid black;
                
            }

    </head>
    <body>
        <table border="2"
               align="center"
               cellpadding="10"
               cellspacing="7">
            <!--ROW1-->
            <tr>
                <td rowspan="3">Table 1</td>
                <td colspan="2">Table 1</td>
            </tr>
            <!--ROW2-->
            <tr>
                <td>Table 2</td>
                <td>Table 2</td>
            </tr>
             <!--ROW3-->
            <tr>
                <td>Table 2</td>
                <td>Table 2</td>
            </tr>
             <!--ROW4-->
            <tr>
                <td>Table 1</td>
                <td colspan="3">Table 1 .</td>
            </tr>
            
        </table>
        
    </body>
</html>
