<!DOCTYPE html>
<html>
    <head>
        <title>Table6</title>
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>
    <body>
        <style>
            table{
                border-collapse: collapse;
                width: 15%;
                text-align: center;
                margin: 100px auto;
                border: 1px solid gray;
            }
        </style>
        <table border="1"
               align="center"
               cellpadding="10"
               cellspacing="10">
            <!--ROW1-->
            <tr>
                <th colspan="4">0</th>
            </tr>
            <!--ROW2-->
            <tr>
                <td><i class="fa fa-plus"></i></td>
                 <td><i class="fa fa-minus"></i></td>
                  <td><i class="fa fa-times"></i></td>
                   <td><i class="fa-solid fa-divide"></i></td>
            </tr>
            <!--ROW3-->
            <tr>
                <td>7</td>
                <td>8</td>
                <td>9</td>
                <td rowspan="4">=</td>
            </tr>
            <!--ROW4-->
            <tr>
                <td>4</td>
                <td>5</td>
                <td>6</td>
            </tr>
            <!--ROW5-->
            <tr>
                <td>3</td>
                <td>2</td>
                <td>1</td>
            </tr>
            <!--ROW6-->
            <tr>
                <td>0</td>
                <td>.</td>
                <td>AC</td>
            </tr>

        </table>
    </body>
</html>
