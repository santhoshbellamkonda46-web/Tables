<!DOCTYPE html>
<html>
    <head>
        <title>Table7</title>
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    </head>
    <body>
        <style>
            table{
                width: 50%;
                text-align: center;
                margin: 100px auto;
                border: 1px solid gray;
                border-collapse: collapse;
            }
            th,td{
                border: 1px solid gray;
            }
            th{
                height: 30px;
            }
            td{
                height: 30px;
            }
        </style>
        <table border="4"
               align="center"
               cellpadding="10">
            <!--ROW1-->
            <tr align="center">
                <th>SNO</th>
                <th>NAME</th>
                <th>COST</th>
                <th>UPDATE</th>
                <th>DELETE</th>
            </tr>
            <!--ROW2-->
            <tr align="center">
                <td>1</td>
                <td>LAPTOP</td>
                <td> <i class="fa fa-inr"></i>50000</td>
                <td> <i class="fa fa-edit"></i></td>
                <td> <i class="fa fa-trash"></i></td>
            </tr>
            <!--ROW3-->
            <tr align="center">
                <td>2</td>
                <td>MOBILE</td>
                <td> <i class="fa fa-dollar"></i>50</td>
                <td> <i class="fa fa-edit"></i></td>
                <td> <i class="fa fa-trash"></i></td>
            </tr>
            <!--ROW4-->
            <tr align="center">
                <td>3</td>
                <td>SHOES</td>
                <td> <i class="fa fa-euro"></i>10</td>
                <td> <i class="fa fa-edit"></i></td>
                <td> <i class="fa fa-trash"></i></td>
            </tr>

        </table>
    </body>
</html>
