<!DOCTYPE html>
<html>
    <head>
        <title>Tables with CSS</title>
        <style>
            table{
                width: 50%;
                text-align: center;
                margin: 100px auto;
                border: 1px solid gray;
            }
            th,td{
                border: 1px solid gray;
            }
            th{
                height: 50px;
            }
            td{
                height: 50px;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th rowspan="3"><br>Day</th>
                <th colspan="3">seminar</th>
            </tr>
            <tr>
                <th colspan="2">schedule</th>
                <th rowspan="2">Topic</th>
            </tr>
             <tr>
                <th>begin</th>
                <th>End</th>
            </tr>
             <tr>
                <td rowspan="2">Monday</td>
                <td rowspan="2">8:00am</td>
                <td rowspan="2">5:00pm</td>
                <td>topic</td>
            </tr>
             <tr>
                <td>Introduction TO XML</td>
            </tr>
             <tr>
                <td rowspan="3">Tuesday</td>
                <td>8:00am</td>
                <td>11:00am</td>
                <td rowspan="2">XPath</td>
            </tr>
             <tr>
                <td>11:00am</td>
                <td>2:00pm</td>
            </tr>
             <tr>
                <td>2:00pm</td>
                <td>5:00pm</td>
                <td>XSL Transformations</td>
            </tr>
             <tr>
                <td>Wednesday</td>
                <td>8:00am</td>
                <td>12:00pm</td>
                <td>XSL Formating Objects</td>
            </tr>
        </table>
    </body>
</html>
