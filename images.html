<!DOCTYPE html>
<html>
    <head>
        <title>images</title>
        <style>
            img{
                border: 1px solid black;
                padding: 20px;
                border-radius: 30px;
                margin: 20px;
            }
            .cl:hover{
                border: 15px solid red;

            }
            .c2:hover{
                width: 150px;
                height: 150px;
                border: 5px solid green;
                border-radius: 100%;

            }
            .c3{
                display: none;

            }
            .c4{
                border-radius: 100%;
            }
        </style>
    </head>
    <body>
        <img src="deepweb.png" alt="deepweb" class="c1">
        <img src="pintrest.png" alt="pintrest" class="c2">
        <img src="hotstar.png" alt="hotstar" class="c3">
        <img src="moto.png" alt="moto" class="c4">
    </body>
</html>
